---
layout: default
---
<article class="product-page">
  <div class="product-hero">
    <img src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.title }}" class="product-hero-img" />
    <div class="product-hero-overlay">
      <h1>{{ page.title }}</h1>
      <span class="product-badge">Disponible</span>
    </div>
  </div>

  <div class="product-body">
    <div class="product-info">
      <div class="product-price-box">
        <span class="product-price-label">Precio</span>
        <span class="product-price-value">${{ page.price }}</span>
      </div>
      <div class="product-description">
        {{ content }}
      </div>
      <a class="btn-comprar" href="#">🛒 Agregar al carrito</a>
      <a class="back-link" href="{{ site.baseurl }}/">← Volver al inicio</a>
    </div>
  </div>
</article>
