---
layout: default
---

<article class="product-page">
  <h2>{{ page.title }}</h2>
  <img src="{{ page.image }}" alt="{{ page.title }}">
  <p class="price">Precio: ${{ page.price }}</p>
  <div class="description">
    {{ content }}
  </div>
  <a class="back-link" href="/">← Volver al inicio</a>
</article>
